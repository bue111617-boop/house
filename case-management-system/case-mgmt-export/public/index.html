<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有巢氏房屋 — 案件管理系統</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.brand-logo { display:flex; align-items:center; gap:10px; }
.brand-logo-icon { width:42px; height:42px; background:#c8102e; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:700; flex-shrink:0; line-height:1.2; text-align:center; }
.nav-brand-sub { font-size:13px; color:var(--text2); margin-top:1px; }
.screenshot-area { border:1.5px dashed var(--border2); border-radius:var(--radius); padding:10px; text-align:center; cursor:pointer; transition:border-color .2s; position:relative; min-height:90px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; }
.screenshot-area:hover { border-color:var(--blue); }
.screenshot-area img { max-width:100%; max-height:200px; border-radius:4px; object-fit:contain; }
.screenshot-area .ph { font-size:14px; color:var(--text3); }
.screenshot-area .ph-icon { font-size:26px; opacity:.4; }
.screenshot-input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.thumb-cell img { width:56px; height:40px; object-fit:cover; border-radius:3px; border:0.5px solid var(--border); vertical-align:middle; }
.thumb-cell .no-img { width:56px; height:40px; background:var(--bg3); border-radius:3px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; color:var(--text3); vertical-align:middle; }
.price-wan { font-size:17px; font-weight:600; color:var(--text); line-height:1; }
.price-unit { font-size:13px; font-weight:500; color:var(--text2); margin-left:2px; }
</style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-logo-icon">有巢氏<br>房屋</div>
      <div>
        <div class="brand-name">有巢氏房屋</div>
        <div class="brand-sub">案件管理系統</div>
      </div>
    </div>
    <div class="login-form">
      <div class="form-group"><label>帳號</label><input type="text" id="loginUsername" placeholder="輸入帳號" autocomplete="username"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="loginPassword" placeholder="輸入密碼" autocomplete="current-password"></div>
      <div class="login-error" id="loginError"></div>
      <button class="btn-primary full-width" id="loginBtn" onclick="doLogin()">登入</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden">
  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-logo">
        <div class="brand-logo-icon" style="width:32px;height:32px;font-size:11px;">有巢氏<br>房屋</div>
        <div>
          <div style="font-size:16px;font-weight:500;color:var(--text)">有巢氏房屋</div>
          <div class="nav-brand-sub">案件管理系統</div>
        </div>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="cases" onclick="switchTab('cases')">案件列表</button>
      <button class="nav-tab" data-tab="users" id="usersTabBtn" onclick="switchTab('users')">用戶管理</button>
    </div>
    <div class="nav-user">
      <div class="user-avatar" id="navAvatar"></div>
      <div class="user-info-nav">
        <span id="navName"></span>
        <span class="role-pill" id="navRole"></span>
      </div>
      <button class="btn-ghost" onclick="openChangePassword()">修改密碼</button>
      <button class="btn-ghost" onclick="doLogout()">登出</button>
    </div>
  </nav>

  <!-- Cases Tab -->
  <div id="tabCases" class="tab-content">
    <div class="page-header">
      <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="toolbar">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10L14 14"/></svg>
        <input type="text" id="searchInput" placeholder="搜索案名、地址、公司、開發姓名…" oninput="loadCases()">
      </div>
      <select id="statusFilter" onchange="loadCases()">
        <option value="">全部狀態</option>
        <option value="active">有效</option>
        <option value="soon">即將截止</option>
        <option value="expired">已截止</option>
      </select>
      <select id="sortField" onchange="loadCases()">
        <option value="createdAt">依新增時間</option>
        <option value="deadline">依截止日</option>
        <option value="price">依委託價格</option>
        <option value="company">依委託公司</option>
      </select>
      <button class="btn-primary" id="addCaseBtn" onclick="openCaseForm()">+ 新增案件</button>
    </div>

    <div class="table-container">
      <table class="data-table" id="casesTable">
        <thead><tr>
          <th style="width:7%">截圖</th>
          <th style="width:10%">案名</th>
          <th style="width:14%">地址</th>
          <th style="width:9%">委託公司</th>
          <th style="width:8%">委託價格</th>
          <th style="width:8%">開發姓名</th>
          <th style="width:9%">開發電話</th>
          <th style="width:8%">配案日期</th>
          <th style="width:7%">截止日</th>
          <th style="width:7%">操作人</th>
          <th style="width:6%">狀態</th>
          <th style="width:7%">操作</th>
        </tr></thead>
        <tbody id="casesBody"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- Users Tab -->
  <div id="tabUsers" class="tab-content hidden">
    <div class="toolbar" style="margin-top:0">
      <h2 style="font-size:18px;font-weight:500;margin:0;flex:1">用戶管理</h2>
      <button class="btn-primary" onclick="openUserForm()">+ 新增用戶</button>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>帳號</th><th>姓名</th><th>角色</th><th>建立時間</th><th>操作</th></tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Case Form Modal -->
<div class="modal-overlay hidden" id="caseModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <span class="modal-title" id="caseModalTitle">新增案件</span>
      <button class="modal-close" onclick="closeCaseModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="section-title">基本資料</div>
      <div class="form-grid">
        <div class="form-group"><label>案名 *</label><input type="text" id="fCaseName" placeholder="例：信義豪宅A棟"></div>
        <div class="form-group"><label>委託公司 *</label><input type="text" id="fCompany" placeholder="公司名稱"></div>
        <div class="form-group col-2"><label>地址 *</label><input type="text" id="fAddress" placeholder="完整地址"></div>
        <div class="form-group"><label>委託價格（萬元）</label><input type="number" id="fPrice" placeholder="0" min="0" step="0.1"></div>
        <div class="form-group"><label>案件網址</label><input type="url" id="fWebsite" placeholder="https://"></div>
      </div>
      <div class="section-title">開發聯絡人</div>
      <div class="form-grid">
        <div class="form-group"><label>開發姓名</label><input type="text" id="fDevName" placeholder="姓名"></div>
        <div class="form-group"><label>開發電話</label><input type="text" id="fDevPhone" placeholder="0912-345-678"></div>
      </div>
      <div class="section-title">時程</div>
      <div class="form-grid">
        <div class="form-group"><label>配案日期</label><input type="date" id="fMatchTime"></div>
        <div class="form-group"><label>截止日</label><input type="date" id="fDeadline"></div>
        <div class="form-group col-2"><label>備注</label><textarea id="fNote" rows="2" placeholder="其他備注…"></textarea></div>
      </div>
      <div class="section-title">配案截圖</div>
      <div class="screenshot-area" id="screenshotArea" onclick="document.getElementById('screenshotInput').click()">
        <input type="file" id="screenshotInput" class="screenshot-input" accept="image/*" onchange="handleScreenshot(event)">
        <div class="ph-icon" id="ssIcon">🖼</div>
        <div class="ph" id="ssText">點擊上傳截圖（JPG / PNG）</div>
        <img id="ssPreview" style="display:none">
      </div>
      <button id="ssClearBtn" style="display:none;margin-top:6px;font-size:12px;" class="btn-ghost btn-sm" onclick="clearScreenshot()">移除截圖</button>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeCaseModal()">取消</button>
      <button class="btn-primary" onclick="saveCase()">儲存</button>
    </div>
  </div>
</div>

<!-- Case Detail Modal -->
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <span class="modal-title" id="detailModalTitle">案件詳情</span>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeDetailModal()">關閉</button>
      <button class="btn-primary" id="detailEditBtn" onclick="editFromDetail()">編輯</button>
    </div>
  </div>
</div>

<!-- User Form Modal -->
<div class="modal-overlay hidden" id="userModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title" id="userModalTitle">新增用戶</span>
      <button class="modal-close" onclick="closeUserModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>帳號 *</label><input type="text" id="uUsername" placeholder="英文帳號"></div>
      <div class="form-group"><label>姓名 *</label><input type="text" id="uName" placeholder="顯示名稱"></div>
      <div class="form-group"><label>密碼 *</label><input type="password" id="uPassword" placeholder="設定密碼（編輯時留空=不更改）"></div>
      <div class="form-group">
        <label>角色</label>
        <select id="uRole">
          <option value="user">一般用戶（可新增/編輯）</option>
          <option value="viewer">查看者（唯讀）</option>
          <option value="admin">管理員（完整權限）</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeUserModal()">取消</button>
      <button class="btn-primary" onclick="saveUser()">儲存</button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-overlay hidden" id="changePwModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title">修改密碼</span>
      <button class="modal-close" onclick="closeChangePassword()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:14px">
        <label>舊密碼 *</label>
        <input type="password" id="cpOld" placeholder="請輸入目前密碼" autocomplete="current-password">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>新密碼 *</label>
        <input type="password" id="cpNew" placeholder="請輸入新密碼（至少 4 個字元）" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>確認新密碼 *</label>
        <input type="password" id="cpConfirm" placeholder="再次輸入新密碼" autocomplete="new-password">
      </div>
      <div id="cpError" style="font-size:14px;color:var(--red-text);min-height:20px;margin-top:10px;"></div>
      <div id="cpSuccess" style="font-size:14px;color:var(--green-text);min-height:20px;margin-top:10px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeChangePassword()">取消</button>
      <button class="btn-primary" onclick="doChangePassword()">儲存密碼</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let allCases = [];
let currentPage = 1;
const PAGE_SIZE = 10;
let editingCaseId = null;
let viewingCaseId = null;
let editingUserId = null;
let screenshotData = null; // base64

const $ = id => document.getElementById(id);
const fmtWan = n => n ? '<span class="price-wan">' + (parseFloat(n) % 1 === 0 ? parseInt(n) : parseFloat(n)) + '<span class="price-unit">萬元</span></span>' : '—';
const fmtDate = d => d ? d.slice(0,10) : '—';
const fmtDateShort = d => d ? d.slice(0,10) : '—';

function getStatus(deadline) {
  if (!deadline) return 'active';
  const diff = (new Date(deadline) - new Date().setHours(0,0,0,0)) / 86400000;
  if (diff < 0) return 'expired';
  if (diff <= 30) return 'soon';
  return 'active';
}
const statusLabel = { active: '有效', expired: '已截止', soon: '即將截止' };
const statusClass = { active: 'badge-active', expired: 'badge-expired', soon: 'badge-soon' };

// screenshot
function handleScreenshot(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    screenshotData = ev.target.result;
    $('ssPreview').src = screenshotData;
    $('ssPreview').style.display = 'block';
    $('ssIcon').style.display = 'none';
    $('ssText').style.display = 'none';
    $('ssClearBtn').style.display = '';
  };
  reader.readAsDataURL(file);
}
function clearScreenshot() {
  screenshotData = null;
  $('ssPreview').src = '';
  $('ssPreview').style.display = 'none';
  $('ssIcon').style.display = '';
  $('ssText').style.display = '';
  $('ssClearBtn').style.display = 'none';
  $('screenshotInput').value = '';
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '請求失敗');
  return data;
}

async function checkAuth() {
  try { currentUser = await api('GET', '/api/auth/me'); showApp(); }
  catch { showLogin(); }
}

async function doLogin() {
  const btn = $('loginBtn');
  btn.disabled = true; btn.textContent = '登入中…';
  $('loginError').textContent = '';
  try {
    const res = await api('POST', '/api/auth/login', {
      username: $('loginUsername').value.trim(),
      password: $('loginPassword').value,
    });
    currentUser = res.user; showApp();
  } catch (e) {
    $('loginError').textContent = e.message;
  } finally { btn.disabled = false; btn.textContent = '登入'; }
}

async function doLogout() {
  await api('POST', '/api/auth/logout');
  currentUser = null;
  $('mainApp').classList.add('hidden');
  $('loginPage').classList.remove('hidden');
  $('loginPassword').value = '';
}

$('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function showLogin() { $('loginPage').classList.remove('hidden'); $('mainApp').classList.add('hidden'); }

function showApp() {
  $('loginPage').classList.add('hidden'); $('mainApp').classList.remove('hidden');
  $('navAvatar').textContent = currentUser.name.slice(0,1);
  $('navName').textContent = currentUser.name;
  const rp = $('navRole');
  rp.textContent = { admin:'管理員', user:'一般用戶', viewer:'查看者' }[currentUser.role];
  rp.className = 'role-pill ' + { admin:'role-admin', user:'role-user', viewer:'role-viewer' }[currentUser.role];
  if (currentUser.role !== 'admin') {
    $('usersTabBtn').classList.add('hidden');
    $('addCaseBtn').style.display = currentUser.role === 'viewer' ? 'none' : '';
  }
  loadCases();
}

function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
  document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
  $('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
  if (tab === 'users') loadUsers();
}

async function loadCases() {
  const q = $('searchInput').value.trim();
  const status = $('statusFilter').value;
  const sort = $('sortField').value;
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (status) params.set('status', status);
  if (sort) params.set('sort', sort);
  try {
    allCases = await api('GET', '/api/cases?' + params);
    currentPage = 1; renderCases(); renderStats();
  } catch (e) { alert(e.message); }
}

function renderStats() {
  const active = allCases.filter(c => getStatus(c.deadline) === 'active').length;
  const soon = allCases.filter(c => getStatus(c.deadline) === 'soon').length;
  const expired = allCases.filter(c => getStatus(c.deadline) === 'expired').length;
  $('statsRow').innerHTML =
    '<div class="stat-card"><div class="stat-label">顯示案件</div><div class="stat-value">' + allCases.length + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">有效</div><div class="stat-value" style="color:var(--green-text)">' + active + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">即將截止</div><div class="stat-value" style="color:var(--amber-text)">' + soon + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">已截止</div><div class="stat-value" style="color:var(--red-text)">' + expired + '</div></div>';
}

function renderCases() {
  const total = allCases.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > pages) currentPage = 1;
  const slice = allCases.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  const isAdmin = currentUser.role === 'admin';
  const canEdit = currentUser.role !== 'viewer';
  const tbody = $('casesBody');
  if (!slice.length) {
    tbody.innerHTML = '<tr><td colspan="12" class="empty-row">找不到符合條件的案件</td></tr>';
  } else {
    tbody.innerHTML = slice.map(c => {
      const s = getStatus(c.deadline);
      const thumb = c.screenshot
        ? '<img src="' + c.screenshot + '" style="width:56px;height:40px;object-fit:cover;border-radius:3px;border:0.5px solid var(--border);vertical-align:middle;cursor:pointer;" onclick="openDetail(' + c.id + ')">'
        : '<div style="width:56px;height:40px;background:var(--bg3);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);vertical-align:middle;">無截圖</div>';
      return '<tr>' +
        '<td class="thumb-cell">' + thumb + '</td>' +
        '<td title="' + (c.case_name||'') + '">' + (c.case_name||'—') + '</td>' +
        '<td title="' + c.address + '">' + c.address + '</td>' +
        '<td>' + c.company + '</td>' +
        '<td>' + fmtWan(c.price) + '</td>' +
        '<td>' + (c.dev_name||'—') + '</td>' +
        '<td>' + (c.dev_phone||'—') + '</td>' +
        '<td>' + fmtDate(c.match_time) + '</td>' +
        '<td>' + (c.deadline||'—') + '</td>' +
        '<td>' + (c.operator_name||c.operator||'—') + '</td>' +
        '<td><span class="badge ' + statusClass[s] + '">' + statusLabel[s] + '</span></td>' +
        '<td>' +
          '<button class="act-btn" onclick="openDetail(' + c.id + ')">查看</button>' +
          (canEdit ? '<button class="act-btn" onclick="openCaseForm(' + c.id + ')">編輯</button>' : '') +
          (isAdmin ? '<button class="act-btn danger" onclick="deleteCase(' + c.id + ')">刪除</button>' : '') +
        '</td></tr>';
    }).join('');
  }
  let pageHtml = '';
  for (let i = 1; i <= pages; i++) pageHtml += '<button class="page-btn ' + (i===currentPage?'active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  $('pagination').innerHTML = '<span>共 ' + total + ' 筆資料</span><div class="page-btns">' + pageHtml + '</div>';
}

function goPage(p) { currentPage = p; renderCases(); }

function openCaseForm(id) {
  editingCaseId = id || null;
  screenshotData = null;
  $('caseModalTitle').textContent = id ? '編輯案件' : '新增案件';
  clearScreenshot();
  if (id) {
    const c = allCases.find(x => x.id === id); if (!c) return;
    $('fCaseName').value = c.case_name || '';
    $('fAddress').value = c.address || '';
    $('fCompany').value = c.company || '';
    $('fWebsite').value = c.website || '';
    $('fPrice').value = c.price || '';
    $('fDevName').value = c.dev_name || '';
    $('fDevPhone').value = c.dev_phone || '';
    $('fMatchTime').value = c.match_time ? c.match_time.slice(0,10) : '';
    $('fDeadline').value = c.deadline || '';
    $('fNote').value = c.note || '';
    if (c.screenshot) {
      screenshotData = c.screenshot;
      $('ssPreview').src = c.screenshot;
      $('ssPreview').style.display = 'block';
      $('ssIcon').style.display = 'none';
      $('ssText').style.display = 'none';
      $('ssClearBtn').style.display = '';
    }
  } else {
    ['fCaseName','fAddress','fCompany','fWebsite','fPrice','fDevName','fDevPhone','fMatchTime','fDeadline','fNote'].forEach(f => $(f).value = '');
  }
  $('caseModal').classList.remove('hidden');
}

function closeCaseModal() { $('caseModal').classList.add('hidden'); }

async function saveCase() {
  const address = $('fAddress').value.trim();
  const company = $('fCompany').value.trim();
  const caseName = $('fCaseName').value.trim();
  if (!address || !company) { alert('請填寫地址和委託公司'); return; }
  const body = {
    case_name: caseName, address, company,
    website: $('fWebsite').value.trim(),
    price: parseFloat($('fPrice').value) || 0,
    dev_name: $('fDevName').value.trim(),
    dev_phone: $('fDevPhone').value.trim(),
    match_time: $('fMatchTime').value,
    deadline: $('fDeadline').value,
    note: $('fNote').value.trim(),
    screenshot: screenshotData || null,
  };
  try {
    if (editingCaseId) { await api('PUT', '/api/cases/' + editingCaseId, body); }
    else { await api('POST', '/api/cases', body); }
    closeCaseModal(); await loadCases();
  } catch (e) { alert(e.message); }
}

async function deleteCase(id) {
  if (!confirm('確定要刪除此案件？此操作無法復原。')) return;
  try { await api('DELETE', '/api/cases/' + id); await loadCases(); }
  catch (e) { alert(e.message); }
}

async function openDetail(id) {
  try {
    const c = await api('GET', '/api/cases/' + id);
    viewingCaseId = id;
    const s = getStatus(c.deadline);
    $('detailModalTitle').innerHTML = (c.case_name ? '<span style="font-weight:500">' + c.case_name + '</span> · ' : '') +
      '<span>' + c.address + '</span> <span class="badge ' + statusClass[s] + '" style="margin-left:8px;vertical-align:middle;">' + statusLabel[s] + '</span>';
    $('detailBody').innerHTML =
      (c.screenshot ? '<img src="' + c.screenshot + '" style="width:100%;max-height:220px;object-fit:contain;border-radius:6px;border:0.5px solid var(--border);margin-bottom:14px;">' : '') +
      '<div class="section-title" style="padding-top:0">基本資料</div>' +
      '<div class="detail-grid">' +
        '<div class="detail-row"><span class="detail-label">案名</span><span class="detail-value">' + (c.case_name||'—') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">委託公司</span><span class="detail-value">' + (c.company||'—') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">委託價格</span><span class="detail-value">' + fmtWan(c.price) + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">案件網址</span><span class="detail-value">' + (c.website ? '<a href="' + c.website + '" target="_blank">' + c.website + '</a>' : '—') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">操作人</span><span class="detail-value">' + (c.operator_name||c.operator||'—') + '</span></div>' +
      '</div>' +
      '<div class="section-title">開發聯絡人</div>' +
      '<div class="detail-grid">' +
        '<div class="detail-row"><span class="detail-label">開發姓名</span><span class="detail-value">' + (c.dev_name||'—') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">開發電話</span><span class="detail-value">' + (c.dev_phone||'—') + '</span></div>' +
      '</div>' +
      '<div class="section-title">時程</div>' +
      '<div class="detail-grid">' +
        '<div class="detail-row"><span class="detail-label">配案日期</span><span class="detail-value">' + fmtDate(c.match_time) + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">截止日</span><span class="detail-value">' + fmtDateShort(c.deadline) + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">建立時間</span><span class="detail-value">' + (c.created_at||'—') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">最後更新</span><span class="detail-value">' + (c.updated_at||'—') + '</span></div>' +
      '</div>' +
      (c.note ? '<div class="section-title">備注</div><div style="font-size:15px;line-height:1.6;">' + c.note + '</div>' : '');
    $('detailEditBtn').style.display = currentUser.role !== 'viewer' ? '' : 'none';
    $('detailModal').classList.remove('hidden');
  } catch (e) { alert(e.message); }
}

function closeDetailModal() { $('detailModal').classList.add('hidden'); }
function editFromDetail() { closeDetailModal(); openCaseForm(viewingCaseId); }

async function loadUsers() {
  try {
    const users = await api('GET', '/api/users');
    const roleLabel = { admin:'管理員', user:'一般用戶', viewer:'查看者' };
    const roleClass = { admin:'role-admin', user:'role-user', viewer:'role-viewer' };
    $('usersBody').innerHTML = users.map(u =>
      '<tr><td>' + u.username + '</td><td>' + u.name + '</td>' +
      '<td><span class="role-pill ' + roleClass[u.role] + '">' + roleLabel[u.role] + '</span></td>' +
      '<td>' + (u.created_at||'—') + '</td>' +
      '<td><button class="act-btn" onclick="openUserForm(' + u.id + ')">編輯</button>' +
      (u.id !== currentUser.id ? '<button class="act-btn danger" onclick="deleteUser(' + u.id + ')">刪除</button>' : '') +
      '</td></tr>'
    ).join('');
  } catch (e) { alert(e.message); }
}

function openUserForm(id) {
  editingUserId = id || null;
  $('userModalTitle').textContent = id ? '編輯用戶' : '新增用戶';
  if (id) {
    api('GET', '/api/users').then(users => {
      const u = users.find(x => x.id === id); if (!u) return;
      $('uUsername').value = u.username; $('uUsername').disabled = true;
      $('uName').value = u.name; $('uPassword').value = ''; $('uRole').value = u.role;
    });
  } else {
    $('uUsername').value = ''; $('uUsername').disabled = false;
    $('uName').value = ''; $('uPassword').value = ''; $('uRole').value = 'user';
  }
  $('userModal').classList.remove('hidden');
}

function closeUserModal() { $('userModal').classList.add('hidden'); }

async function saveUser() {
  const body = { name: $('uName').value.trim(), role: $('uRole').value, password: $('uPassword').value };
  try {
    if (editingUserId) { await api('PUT', '/api/users/' + editingUserId, body); }
    else { body.username = $('uUsername').value.trim(); await api('POST', '/api/users', body); }
    closeUserModal(); loadUsers();
  } catch (e) { alert(e.message); }
}

async function deleteUser(id) {
  if (!confirm('確定要刪除此用戶？')) return;
  try { await api('DELETE', '/api/users/' + id); loadUsers(); }
  catch (e) { alert(e.message); }
}

$('caseModal').addEventListener('click', e => { if (e.target === $('caseModal')) closeCaseModal(); });
$('detailModal').addEventListener('click', e => { if (e.target === $('detailModal')) closeDetailModal(); });
$('userModal').addEventListener('click', e => { if (e.target === $('userModal')) closeUserModal(); });

function openChangePassword() {
  $('cpOld').value = ''; $('cpNew').value = ''; $('cpConfirm').value = '';
  $('cpError').textContent = ''; $('cpSuccess').textContent = '';
  $('changePwModal').classList.remove('hidden');
}

function closeChangePassword() { $('changePwModal').classList.add('hidden'); }

async function doChangePassword() {
  const oldPassword = $('cpOld').value;
  const newPassword = $('cpNew').value;
  const confirm = $('cpConfirm').value;
  $('cpError').textContent = ''; $('cpSuccess').textContent = '';
  if (!oldPassword || !newPassword || !confirm) { $('cpError').textContent = '請填寫所有欄位'; return; }
  if (newPassword.length < 4) { $('cpError').textContent = '新密碼至少需要 4 個字元'; return; }
  if (newPassword !== confirm) { $('cpError').textContent = '兩次輸入的新密碼不相符'; return; }
  try {
    await api('POST', '/api/auth/change-password', { oldPassword, newPassword });
    $('cpSuccess').textContent = '密碼已成功修改！';
    $('cpOld').value = ''; $('cpNew').value = ''; $('cpConfirm').value = '';
    setTimeout(closeChangePassword, 1500);
  } catch (e) { $('cpError').textContent = e.message; }
}

$('changePwModal').addEventListener('click', e => { if (e.target === $('changePwModal')) closeChangePassword(); });

checkAuth();
</script>
</body>
</html>
